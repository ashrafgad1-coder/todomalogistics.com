<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOMA LOGISTICS - تودوما لوجيستيك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background: #0a192f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .logo {
            width: 100%;
            max-width: 550px;
            height: auto;
            display: block;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 12px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            .logo {
                max-width: 100%;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>
    <img src="todoma-coming-soon.png" alt="TODOMA LOGISTICS - Coming Soon" class="logo">
</body>
</html>
