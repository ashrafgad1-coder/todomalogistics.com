<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOMA LOGISTICS - Coming Soon | قريباً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0A192F;
        }
        
        .wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0A192F;
            position: relative;
        }
        
        .bg-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        
        /* زرار واتساب فوق الرقم في الصورة */
        .whatsapp-link {
            position: absolute;
            bottom: 8.5%;
            right: 7%;
            width: 16%;
            height: 6%;
            cursor: pointer;
            z-index: 10;
        }
        
        /* زرار الإيميل */
        .email-link {
            position: absolute;
            bottom: 8.5%;
            right: 29%;
            width: 20%;
            height: 6%;
            cursor: pointer;
            z-index: 10;
        }
        
        /* موبايل */
        @media (max-width: 768px) {
            .whatsapp-link {
                bottom: 9%;
                right: 8%;
                width: 35%;
                height: 5%;
            }
            .email-link {
                bottom: 15%;
                right: 8%;
                width: 45%;
                height: 5%;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="todoma-coming-soon.png" alt="TODOMA LOGISTICS" class="bg-image">
        
        <!-- واتساب -->
        <a href="https://wa.me/201008330999?text=مرحبا%20TODOMA%20LOGISTICS"

        <a href="mailto:info@todomalogistics.com" 
           class="email-link" 
           target="_blank">
        </a>
    </div>
</body>
</html>
