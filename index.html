<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOMA LOGISTICS - تودوما لوجيستيك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100vh;
            background: #051326;
            overflow: hidden;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .logo {
            max-width: 100%;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
        }
        
        /* للشاشات الكبيرة - كمبيوتر */
        @media (min-width: 1024px) {
            .logo {
                max-width: 500px;
                max-height: 90vh;
            }
        }
        
        /* للموبايل */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            .logo {
                max-width: 100%;
                max-height: 90vh;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <img src="todoma-coming-soon.png" alt="TODOMA LOGISTICS - Coming Soon" class="logo">
</body>
</html>
